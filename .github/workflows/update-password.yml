name: Update Password Daily

on:
  schedule:
    - cron: '30 18 * * *'   # 12 AM IST
  workflow_dispatch:

permissions:
  contents: write   # 🔥 REQUIRED

jobs:
  update-password:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate password
        run: |
          node <<EOF
          function hashCode(str) {
              let hash = 0;
              for (let i = 0; i < str.length; i++) {
                  hash = (hash << 5) - hash + str.charCodeAt(i);
                  hash |= 0;
              }
              return Math.abs(hash);
          }

          function generatePassword(seed) {
              const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+";
              let password = "";

              let num = hashCode(seed);

              for (let i = 0; i < 16; i++) {
                  num = (num * 9301 + 49297) % 233280;
                  const index = num % chars.length;
                  password += chars.charAt(index);
              }

              return password;
          }

          const now = new Date();
          const istOffset = 5.5 * 60 * 60 * 1000;
          const istTime = new Date(now.getTime() + istOffset);
          const today = istTime.toISOString().split('T')[0];
          const password = generatePassword(today);

          const fs = require('fs');
          fs.writeFileSync(
            'password.json',
            JSON.stringify({ password: password, updated: Date.now() }, null, 2)
          );
          EOF

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add password.json
          git commit -m "Update password" || echo "No changes"
          git push
